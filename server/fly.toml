app = 'score26'
primary_region = 'cdg'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  LOG_LEVEL = 'info'
  DATABASE_PATH = '/data/score26.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'score26_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
